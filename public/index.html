<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>(Your Business Name Here)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 font-sans">
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="text-2xl font-bold text-blue-600">(Your Logo)</div>
        <div class="space-x-6 text-gray-600">
            <a href="#">Services</a><a href="#">About</a><a href="#" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Contact Us</a>
        </div>
    </nav>

    <section class="py-20 text-center max-w-4xl mx-auto">
        <h1 class="text-6xl font-extrabold mb-6 leading-tight">Elevate Your Business With <span class="text-blue-600">(Your Service)</span></h1>
        <p class="text-xl text-gray-600 mb-10">We help customers in (Your City) get the best results with zero stress. Join 500+ happy clients today.</p>
        <div class="bg-gray-50 p-8 rounded-2xl shadow-xl border border-gray-200 inline-block text-left w-full max-w-md">
            <h3 class="font-bold mb-4">Request a Quote</h3>
            <input id="name" type="text" placeholder="Full Name" class="w-full mb-3 p-3 border rounded-lg">
            <input id="phone" type="text" placeholder="Phone Number" class="w-full mb-4 p-3 border rounded-lg">
            <button onclick="submitLead()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">Get Started</button>
            <p id="msg" class="mt-3 text-center text-green-600 font-medium"></p>
        </div>
    </section>

    <script>
        async function submitLead() {
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                interest: "Landing Page Inquiry"
            };
            const res = await fetch('/api/leads', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if (res.ok) {
                document.getElementById('msg').innerText = "Sent! We'll call you soon.";
            }
        }
    </script>
</body>
</html>
